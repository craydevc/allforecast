<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nifty 50 — Multi-Forecast Analyser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e1117; color: #d1d4dc; font-family: monospace; padding: 10px; min-height: 100vh; display: flex; flex-direction: column; }

  #topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
  #topbar h1 { font-size: 14px; color: #fff; font-weight: 700; }
  #status { font-size: 11px; color: #555; }

  #toolbar { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; flex-shrink: 0; margin-bottom: 6px; }
  .btn { font-size: 10px; padding: 3px 9px; border-radius: 3px; cursor: pointer; border: 1px solid #363a45; background: #2a2d3a; color: #888; font-family: monospace; }
  .btn.active { background: #26a69a22; color: #26a69a; border-color: #26a69a66; }
  .btn:hover { color: #d1d4dc; border-color: #555; }
  .sep { width: 1px; height: 16px; background: #363a45; margin: 0 2px; }

  #chart-area { position: relative; height: 340px; flex-shrink: 0; margin-bottom: 8px; }
  canvas { display: block; cursor: crosshair; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(19,23,34,0.96); border: 1px solid #363a45; border-radius: 5px; padding: 7px 11px; font-size: 11px; line-height: 1.9; display: none; white-space: nowrap; z-index: 10; }

  /* comparison table */
  #analysis { flex: 1; overflow-y: auto; }
  .section-title { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; padding: 6px 0 4px 0; border-bottom: 1px solid #1e222d; margin-bottom: 4px; }

  table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 12px; }
  th { background: #131722; color: #555; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; padding: 5px 8px; text-align: center; border-bottom: 1px solid #1e222d; position: sticky; top: 0; }
  th:first-child { text-align: left; }
  td { padding: 4px 8px; border-bottom: 1px solid #0e111788; text-align: center; }
  td:first-child { text-align: left; color: #555; font-size: 10px; }
  tr:hover td { background: #131722; }
  .winner { background: #26a69a11 !important; }
  .best { color: #26a69a; font-weight: 700; }
  .good { color: #26a69a; }
  .mid  { color: #f0b429; }
  .bad  { color: #ef5350; }
  .rank1 { color: #f0b429; font-size: 14px; }
  .rank2 { color: #888; font-size: 14px; }
  .rank3 { color: #cd7f32; font-size: 14px; }

  #footer { display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-top: 5px; flex-wrap: wrap; gap: 4px; flex-shrink: 0; }
  #legend { display: flex; gap: 12px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 10px; height: 3px; border-radius: 1px; }
  #hover-info { font-size: 11px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>

<div id="topbar">
  <h1>📈 Nifty 50 — Multi-Forecast Analyser</h1>
  <span id="status">Loading...</span>
</div>

<div id="toolbar">

  <div class="sep"></div>
  <button class="btn" onclick="zoom(-1)">＋</button>
  <button class="btn" onclick="zoom(1)">－</button>
  <button class="btn" onclick="fitAll()">Fit</button>
  <div class="sep"></div>
  <button class="btn active" id="src-live" onclick="setSource('live')">🔴 Live</button>
  <button class="btn"        id="src-test" onclick="setSource('test')">📋 Test</button>
  <div class="sep"></div>
  <span id="hover-info"></span>
</div>

<div id="chart-area">

</div>

</div>

const START_HOUR=9, START_MIN=15;
const REFRESH_MS=60000;
const YAHOO_URL='https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEI?interval=1m&range=1d';
const PROXIES=[
  url=>url,
  url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
  url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url=>`https://thingproxy.freeboard.io/fetch/${url}`,
];

let liveData=[], currentTF=1, dataSource='test';
let refreshTimer, countdownTimer, countdownVal=60;
let lvData=[], fcDataArr=[];
let startIdx=0, visCount=0;
let isDragging=false, dragStartX=0, dragStartIdx=0;
let mouseX=-1, mouseY=-1, W, H;

// ============================================================
// FETCH
// ============================================================
async function tryFetch(url) {
  for(let i=0;i<PROXIES.length;i++){
    try{
      setStatus(`⏳ Trying source ${i+1}/${PROXIES.length}...`,'#f0b429');
      const res=await fetch(PROXIES[i](url+'&nc='+Date.now()),{mode:'cors'});
      if(!res.ok)throw new Error('HTTP '+res.status);
      const text=await res.text();
      const json=JSON.parse(text);
      const data=json.contents?JSON.parse(json.contents):json;
      const closes=data?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
      if(!closes||closes.length<2)throw new Error('no closes');
      const clean=closes.filter(v=>v!=null&&!isNaN(v));
      if(clean.length<2)throw new Error('empty');
      return clean;
    }catch(e){console.warn(`Source ${i+1} failed:`,e.message);}
  }
  return null;
}

function toZero(arr){const o=arr[0];return arr.map(v=>+(v-o).toFixed(2));}

async function fetchAndUpdate(){
  if(dataSource==='test'){
    liveData=TEST_ACTUAL;
    setStatus(`📋 Test mode · ${liveData.length} bars`,'#e040fb');
    buildAll();renderTable();draw();return;
  }
  const raw=await tryFetch(YAHOO_URL);
  if(raw&&raw.length>1){
    liveData=toZero(raw);
    setStatus(`<span style="color:#ef5350;animation:pulse 1.5s infinite;display:inline-block">●</span> Live · ${liveData.length} bars · refresh in <span id="cd">${countdownVal}</span>s`,'#555');
    document.getElementById('last-update').textContent='Updated: '+new Date().toLocaleTimeString('en-IN');
  }else{
    if(liveData.length===0){liveData=TEST_ACTUAL;setStatus('⚠️ All sources failed · test data','#f0b429');}
    else setStatus(`⚠️ Refresh failed · ${liveData.length} bars`,'#f0b429');
  }
  buildAll();renderTable();draw();startCountdown();
}

function setStatus(html,col){
  const el=document.getElementById('status');
  el.innerHTML=html;el.style.color=col;
}

function startCountdown(){
  clearInterval(countdownTimer);countdownVal=REFRESH_MS/1000;
  countdownTimer=setInterval(()=>{
    countdownVal--;const el=document.getElementById('cd');
    if(el)el.textContent=countdownVal;
    if(countdownVal<=0)clearInterval(countdownTimer);
  },1000);
}

function setSource(src){
  dataSource=src;
  document.querySelectorAll('[id^="src-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('src-'+src).classList.add('active');
  clearInterval(refreshTimer);
  fetchAndUpdate();
  if(src==='live')refreshTimer=setInterval(fetchAndUpdate,REFRESH_MS);
}

// ============================================================
// RESAMPLE
// ============================================================
function makeLabel(i,tf){
  const mins=START_HOUR*60+START_MIN+i*tf;
  const h=Math.floor(mins/60),m=mins%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function resample(arr,tf){
  const bars=[],total=Math.floor(arr.length/tf);
  for(let i=0;i<total;i++){const g=arr.slice(i*tf,i*tf+tf);bars.push({label:makeLabel(i,tf),c:+g[g.length-1].toFixed(2)});}
  const rem=arr.length%tf;
  if(rem>0){const g=arr.slice(total*tf);bars.push({label:makeLabel(total,tf),c:+g[g.length-1].toFixed(2)});}
  return bars;
}
function calcMA(arr,p){
  return arr.map((_,i)=>{
    if(i<p-1)return null;
    return +(arr.slice(i-p+1,i+1).reduce((a,b)=>a+b.c,0)/p).toFixed(2);
  });
}
function buildAll(){
  lvData=resample(liveData,currentTF);
  fcDataArr=FORECASTS.map(f=>resample(f.data,currentTF));
  const max=Math.max(lvData.length,...fcDataArr.map(f=>f.length));
  visCount=max;startIdx=0;
  document.getElementById('bar-count').textContent=`LV:${lvData.length} · ${currentTF}m`;
}

// ============================================================
// ALL CALCULATIONS
// ============================================================
function pearson(a,b){
  const n=Math.min(a.length,b.length);if(n<2)return 0;
  const ax=a.slice(0,n),bx=b.slice(0,n);
  const ma=ax.reduce((s,v)=>s+v,0)/n,mb=bx.reduce((s,v)=>s+v,0)/n;
  let num=0,da=0,db=0;
  for(let i=0;i<n;i++){const A=ax[i]-ma,B=bx[i]-mb;num+=A*B;da+=A*A;db+=B*B;}
  if(da===0||db===0)return 0;
  return num/Math.sqrt(da*db);
}
function r2p(r){return Math.max(0,Math.min(100,Math.round(((r+1)/2)*100)));}
function pct(v){return Math.round(v*100)+'%';}

function analyse(live, fc) {
  const n=Math.min(live.length,fc.length);
  if(n<2) return null;
  const lv=live.slice(0,n), fv=fc.slice(0,n);

  // 1. Correlations
  const corrFull = r2p(pearson(lv,fv));
  const w60=Math.min(n,Math.floor(60/currentTF));
  const corr60 = r2p(pearson(lv.slice(Math.max(0,n-w60)),fv.slice(Math.max(0,n-w60))));
  const w30=Math.min(n,Math.floor(30/currentTF));
  const corr30 = r2p(pearson(lv.slice(Math.max(0,n-w30)),fv.slice(Math.max(0,n-w30))));
  const w15=Math.min(n,Math.floor(15/currentTF));
  const corr15 = r2p(pearson(lv.slice(Math.max(0,n-w15)),fv.slice(Math.max(0,n-w15))));
  const w5=Math.min(n,Math.floor(5/currentTF));
  const corr5  = r2p(pearson(lv.slice(Math.max(0,n-w5)),fv.slice(Math.max(0,n-w5))));

  // best 30-min window
  let bestWinCorr=-2,bestWinLabel='--';
  const ws=Math.floor(30/currentTF);
  for(let i=0;i<=n-ws;i++){
    const r=pearson(lv.slice(i,i+ws),fv.slice(i,i+ws));
    if(r>bestWinCorr){bestWinCorr=r;bestWinLabel=makeLabel(i,currentTF);}
  }

  // worst 30-min window
  let worstWinCorr=2,worstWinLabel='--';
  for(let i=0;i<=n-ws;i++){
    const r=pearson(lv.slice(i,i+ws),fv.slice(i,i+ws));
    if(r<worstWinCorr){worstWinCorr=r;worstWinLabel=makeLabel(i,currentTF);}
  }

  // 2. Direction accuracy
  let dirTotal=0,dirMatch=0,upTotal=0,upMatch=0,dnTotal=0,dnMatch=0;
  let streak=0,maxStreak=0,curStreak=0;
  for(let i=1;i<n;i++){
    const ld=lv[i]-lv[i-1], fd=fv[i]-fv[i-1];
    const same=(ld>=0&&fd>=0)||(ld<0&&fd<0);
    dirTotal++;if(same){dirMatch++;curStreak++;maxStreak=Math.max(maxStreak,curStreak);}else curStreak=0;
    if(ld>=0){upTotal++;if(same)upMatch++;}else{dnTotal++;if(same)dnMatch++;}
  }
  const dirAcc  = dirTotal?Math.round(dirMatch/dirTotal*100):0;
  const upAcc   = upTotal?Math.round(upMatch/upTotal*100):0;
  const dnAcc   = dnTotal?Math.round(dnMatch/dnTotal*100):0;

  // current streak (from end)
  curStreak=0;
  for(let i=n-1;i>=1;i--){
    const ld=lv[i]-lv[i-1],fd=fv[i]-fv[i-1];
    if((ld>=0&&fd>=0)||(ld<0&&fd<0))curStreak++;else break;
  }

  // 3. Magnitude / error
  const errors=lv.map((v,i)=>Math.abs(v-fv[i]));
  const mae=+(errors.reduce((a,b)=>a+b,0)/n).toFixed(1);
  const maxErr=+Math.max(...errors).toFixed(1);
  const minErr=+Math.min(...errors).toFixed(1);
  const within5  = Math.round(errors.filter(e=>e<=5).length/n*100);
  const within10 = Math.round(errors.filter(e=>e<=10).length/n*100);
  const within20 = Math.round(errors.filter(e=>e<=20).length/n*100);

  // 4. Time shift
  const maxS=Math.min(60,Math.floor(n/3));
  let bestS=0,bestR=-2;
  for(let s=-maxS;s<=maxS;s++){
    let la,fb;
    if(s>=0){la=lv.slice(s,n);fb=fv.slice(0,n-s);}
    else{la=lv.slice(0,n+s);fb=fv.slice(-s,n);}
    const r=pearson(la,fb);if(r>bestR){bestR=r;bestS=s;}
  }
  const shiftMins=bestS*currentTF;
  const shiftLabel=shiftMins===0?'In sync':shiftMins>0?`+${shiftMins}m`:` ${shiftMins}m`;

  // 5. Session match
  const mornEnd=Math.min(n,Math.floor(165/currentTF)); // 9:15-12:00 = 165 mins
  const corrMorn=mornEnd>1?r2p(pearson(lv.slice(0,mornEnd),fv.slice(0,mornEnd))):0;
  const corrAftn=mornEnd<n?r2p(pearson(lv.slice(mornEnd),fv.slice(mornEnd))):0;

  // 6. Trend / peak / trough
  const lvHiIdx=lv.indexOf(Math.max(...lv));
  const lvLoIdx=lv.indexOf(Math.min(...lv));
  const fcHiIdx=fv.indexOf(Math.max(...fv));
  const fcLoIdx=fv.indexOf(Math.min(...fv));
  const peakDiff=Math.abs(lvHiIdx-fcHiIdx)*currentTF; // mins
  const troughDiff=Math.abs(lvLoIdx-fcLoIdx)*currentTF;
  const peakOk=peakDiff<=30;
  const troughOk=troughDiff<=30;

  const lvHi=Math.max(...lv), fcHi=Math.max(...fv);
  const lvLo=Math.min(...lv), fcLo=Math.min(...fv);
  const hiAcc=100-Math.min(100,Math.round(Math.abs(lvHi-fcHi)/Math.max(1,Math.abs(lvHi))*100));
  const loAcc=100-Math.min(100,Math.round(Math.abs(lvLo-fcLo)/Math.max(1,Math.abs(lvLo))*100));
  const eodDiff=Math.abs(lv[n-1]-fv[n-1]);
  const eodAcc=100-Math.min(100,Math.round(eodDiff/Math.max(1,Math.abs(lv[n-1]))*100));

  // trend direction
  const lvTrend=lv[n-1]>=lv[0];
  const fcTrend=fv[n-1]>=fv[0];
  const trendMatch=lvTrend===fcTrend;

  // composite score (weighted)
  const score=Math.round(
    corrFull*0.20 + corr30*0.15 + corr15*0.10 +
    dirAcc*0.15 + within10*0.10 +
    corrMorn*0.10 + corrAftn*0.10 +
    hiAcc*0.05 + loAcc*0.05
  );

  return {
    corrFull,corr60,corr30,corr15,corr5,
    bestWinLabel,worstWinLabel,
    dirAcc,upAcc,dnAcc,maxStreak,curStreak,
    mae,maxErr,minErr,within5,within10,within20,
    shiftMins,shiftLabel,corrMorn,corrAftn,
    trendMatch,peakOk,troughOk,peakDiff,troughDiff,
    hiAcc,loAcc,eodAcc,score
  };
}

// ============================================================
// RENDER TABLE
// ============================================================
function renderTable(){
  const results=FORECASTS.map((f,i)=>({
    ...f,
    res: lvData.length<2?null:analyse(liveData.slice(0,Math.min(liveData.length,375)), f.data.slice(0,375))
  }));

  // find best per metric
  function best(key,higher=true){
    let b=higher?-Infinity:Infinity,bi=-1;
    results.forEach((r,i)=>{if(r.res){const v=r.res[key];if(higher?v>b:v<b){b=v;bi=i;}}});
    return bi;
  }

  // rank by score
  const ranked=[...results].sort((a,b)=>(b.res?.score||0)-(a.res?.score||0));

  // build header
  const head=document.getElementById('tbl-head');
  head.innerHTML='<tr><th>Metric</th>'+results.map(r=>`<th style="color:${r.color}">${r.name}</th>`).join('')+'</tr>';

  const rows=[
    // GROUP: CORRELATION
    {label:'── CORRELATION ──',group:true},
    {label:'Full day',key:'corrFull',unit:'%',higher:true},
    {label:'Last 60 min',key:'corr60',unit:'%',higher:true},
    {label:'Last 30 min',key:'corr30',unit:'%',higher:true},
    {label:'Last 15 min',key:'corr15',unit:'%',higher:true},
    {label:'Last 5 min', key:'corr5', unit:'%',higher:true},
    {label:'Best window',key:'bestWinLabel',unit:'',higher:null},
    {label:'Worst window',key:'worstWinLabel',unit:'',higher:null},
    // GROUP: DIRECTION
    {label:'── DIRECTION ──',group:true},
    {label:'Overall accuracy',key:'dirAcc',unit:'%',higher:true},
    {label:'Up move accuracy',key:'upAcc',unit:'%',higher:true},
    {label:'Down move accuracy',key:'dnAcc',unit:'%',higher:true},
    {label:'Best streak (bars)',key:'maxStreak',unit:'',higher:true},
    {label:'Current streak',key:'curStreak',unit:'',higher:true},
    // GROUP: MAGNITUDE
    {label:'── MAGNITUDE ──',group:true},
    {label:'Avg error (pts)',key:'mae',unit:'',higher:false},
    {label:'Max error (pts)',key:'maxErr',unit:'',higher:false},
    {label:'Within 5 pts',key:'within5',unit:'%',higher:true},
    {label:'Within 10 pts',key:'within10',unit:'%',higher:true},
    {label:'Within 20 pts',key:'within20',unit:'%',higher:true},
    // GROUP: TIME
    {label:'── TIME SHIFT ──',group:true},
    {label:'Shift (mins)',key:'shiftLabel',unit:'',higher:null},
    {label:'Morning match',key:'corrMorn',unit:'%',higher:true},
    {label:'Afternoon match',key:'corrAftn',unit:'%',higher:true},
    // GROUP: TREND
    {label:'── TREND ──',group:true},
    {label:'Day trend match',key:'trendMatch',unit:'',higher:null,bool:true},
    {label:'Peak timing (±30m)',key:'peakOk',unit:'',higher:null,bool:true},
    {label:'Trough timing (±30m)',key:'troughOk',unit:'',higher:null,bool:true},
    {label:'High accuracy',key:'hiAcc',unit:'%',higher:true},
    {label:'Low accuracy',key:'loAcc',unit:'%',higher:true},
    {label:'End of day accuracy',key:'eodAcc',unit:'%',higher:true},
    // GROUP: OVERALL
    {label:'── OVERALL ──',group:true},
    {label:'Composite score',key:'score',unit:'%',higher:true},
    {label:'Rank',key:'rank',unit:'',higher:null,special:'rank'},
  ];

  const tbody=document.getElementById('tbl-body');
  tbody.innerHTML='';

  rows.forEach(row=>{
    const tr=document.createElement('tr');
    if(row.group){
      tr.innerHTML=`<td colspan="${results.length+1}" style="color:#363a45;font-size:9px;letter-spacing:1px;padding:8px 8px 3px 8px;background:#0e1117">${row.label}</td>`;
      tbody.appendChild(tr);return;
    }

    const bestIdx=row.higher!==null&&!row.bool&&row.special!=='rank'?best(row.key,row.higher):-1;
    let cells=`<td>${row.label}</td>`;

    results.forEach((r,i)=>{
      if(!r.res){cells+=`<td style="color:#363a45">--</td>`;return;}

      if(row.special==='rank'){
        const rankPos=ranked.findIndex(x=>x.name===r.name)+1;
        const medal=rankPos===1?'🥇':rankPos===2?'🥈':'🥉';
        cells+=`<td class="${i===ranked.findIndex(x=>x.name===r.name)?'winner':''}">${medal}</td>`;
        return;
      }

      const val=r.res[row.key];
      let display=val;
      let cls='';

      if(row.bool){
        display=val?'✅':'❌';
      } else if(row.unit==='%'&&typeof val==='number'){
        display=val+'%';
        cls=val>=70?'good':val>=50?'mid':'bad';
      } else if(typeof val==='number'){
        cls=i===bestIdx?'best':'';
      }

      if(i===bestIdx&&!row.bool)cls='best';
      const winnerClass=i===bestIdx?'winner':'';
      cells+=`<td class="${winnerClass}"><span class="${cls}">${display}</span></td>`;
    });

    tr.innerHTML=cells;
    tbody.appendChild(tr);
  });

  // build legend
  const leg=document.getElementById('legend');
  leg.innerHTML=`<div class="leg"><div class="leg-dot" style="background:#4fc3f7"></div><span>Live</span></div>`+
    FORECASTS.map(f=>`<div class="leg"><div class="leg-dot" style="background:${f.color}"></div><span>${f.name}</span></div>`).join('');
}

// ============================================================
// CANVAS
// ============================================================
const chartArea=document.getElementById('chart-area');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const tip=document.getElementById('tooltip');
const PAD={L:10,R:76,T:16,B:28};

function resize(){W=chartArea.clientWidth;H=chartArea.clientHeight;cv.width=W;cv.height=H;draw();}
function pxY(v,lo,hi){return PAD.T+(1-(v-lo)/(hi-lo))*(H-PAD.T-PAD.B);}
function pxX(i,cw){return PAD.L+i*cw+cw/2;}
function fitAll(){startIdx=0;visCount=Math.max(lvData.length,...fcDataArr.map(f=>f.length));draw();}
function zoom(dir){
  const max=Math.max(lvData.length,...fcDataArr.map(f=>f.length));
  const step=Math.max(5,Math.floor(visCount*0.15));
  visCount=Math.max(10,Math.min(max,visCount+dir*step));
  startIdx=Math.max(0,Math.min(max-visCount,startIdx));draw();
}
function setTF(tf,btn){
  currentTF=tf;
  document.querySelectorAll('.btn[onclick^="setTF"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildAll();renderTable();draw();
}

function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#131722';ctx.fillRect(0,0,W,H);
  const max=Math.max(lvData.length,...fcDataArr.map(f=>f.length));
  if(!max)return;
  if(visCount===0)visCount=max;
  const cw=(W-PAD.L-PAD.R)/visCount;

  const lvSl=lvData.slice(startIdx,startIdx+visCount);
  const fcSls=fcDataArr.map(f=>f.slice(startIdx,startIdx+visCount));
  const allV=[...lvSl.map(d=>d.c),...fcSls.flatMap(f=>f.map(d=>d.c))].filter(v=>v!==undefined);
  if(!allV.length)return;
  let lo=Math.min(...allV,0),hi=Math.max(...allV,0);
  const pad=Math.max((hi-lo)*0.10,1);lo-=pad;hi+=pad;

  // gridlines
  const gc=Math.min(6,Math.floor(H/50));
  for(let i=0;i<=gc;i++){
    const y=PAD.T+i*(H-PAD.T-PAD.B)/gc,val=hi-i*(hi-lo)/gc;
    ctx.strokeStyle='rgba(128,128,128,0.10)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(PAD.L,y);ctx.lineTo(W-PAD.R,y);ctx.stroke();
    ctx.fillStyle='#555';ctx.font='10px monospace';ctx.textAlign='left';
    ctx.fillText((val>=0?'+':'')+val.toFixed(1),W-PAD.R+4,y+4);
  }

  // zero line
  const zy=pxY(0,lo,hi);
  ctx.strokeStyle='rgba(200,200,200,0.25)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(PAD.L,zy);ctx.lineTo(W-PAD.R,zy);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#777';ctx.font='bold 10px monospace';ctx.textAlign='left';
  ctx.fillText('0',W-PAD.R+4,zy+4);

  function plotLine(sl,col,lw=1.5){
    if(!sl||!sl.length)return;
    ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.lineJoin='round';ctx.setLineDash([]);
    ctx.beginPath();
    sl.forEach((d,i)=>{const x=pxX(i,cw),y=pxY(d.c,lo,hi);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();
  }

  // draw forecast lines first (thinner, behind)
  fcSls.forEach((sl,i)=>plotLine(sl,FORECASTS[i].color,1.5));

  // draw live on top (thicker, blue)
  plotLine(lvSl,'#4fc3f7',2.5);

  // crosshair
  if(mouseX>=PAD.L&&mouseX<=W-PAD.R&&mouseY>=PAD.T&&mouseY<=H-PAD.B){
    const i=Math.max(0,Math.min(visCount-1,Math.floor((mouseX-PAD.L)/cw)));
    ctx.strokeStyle='rgba(200,200,200,0.20)';ctx.lineWidth=0.7;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(mouseX,PAD.T);ctx.lineTo(mouseX,H-PAD.B);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD.L,mouseY);ctx.lineTo(W-PAD.R,mouseY);ctx.stroke();
    ctx.setLineDash([]);

    // snap dots
    const lv=lvSl[i];
    if(lv){ctx.beginPath();ctx.arc(pxX(i,cw),pxY(lv.c,lo,hi),4,0,Math.PI*2);ctx.fillStyle='#4fc3f7';ctx.fill();ctx.strokeStyle='#0e1117';ctx.lineWidth=1.5;ctx.stroke();}
    fcSls.forEach((sl,fi)=>{
      const d=sl[i];
      if(d){ctx.beginPath();ctx.arc(pxX(i,cw),pxY(d.c,lo,hi),3,0,Math.PI*2);ctx.fillStyle=FORECASTS[fi].color;ctx.fill();}
    });

    // axis labels
    const hv=hi-(mouseY-PAD.T)/(H-PAD.T-PAD.B)*(hi-lo);
    ctx.fillStyle='#2a2d3a';ctx.strokeStyle='#444';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.rect(W-PAD.R+1,mouseY-9,PAD.R-3,18);ctx.fill();ctx.stroke();
    ctx.fillStyle='#d1d4dc';ctx.font='10px monospace';ctx.textAlign='left';
    ctx.fillText((hv>=0?'+':'')+hv.toFixed(1),W-PAD.R+4,mouseY+4);

    const lbl=(lv||fcSls[0][i])?.label||'';
    if(lbl){
      const lw2=ctx.measureText(lbl).width+10;
      ctx.fillStyle='#2a2d3a';ctx.strokeStyle='#444';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.rect(pxX(i,cw)-lw2/2,H-PAD.B+2,lw2,16);ctx.fill();ctx.stroke();
      ctx.fillStyle='#d1d4dc';ctx.font='10px monospace';ctx.textAlign='center';
      ctx.fillText(lbl,pxX(i,cw),H-PAD.B+13);
    }

    // tooltip
    const s=v=>(v>=0?'+':'')+v.toFixed(2);
    let html=`<b style="color:#888">${lbl}</b>`;
    if(lv)html+=`<br><span style="color:#4fc3f7">● Live: ${s(lv.c)}</span>`;
    fcSls.forEach((sl,fi)=>{
      const d=sl[i];
      if(d)html+=`<br><span style="color:${FORECASTS[fi].color}">● ${FORECASTS[fi].name}: ${s(d.c)}</span>`;
    });
    tip.innerHTML=html;
    tip.style.left=(mouseX+14+200>W?mouseX-220:mouseX+14)+'px';
    tip.style.top=Math.max(0,mouseY-14)+'px';
    tip.style.display='block';
  }

  // last price pins
  [[lvSl,'#4fc3f7'],...fcSls.map((sl,i)=>[sl,FORECASTS[i].color])].forEach(([sl,col])=>{
    if(!sl||!sl.length)return;
    const last=sl[sl.length-1];
    const ly=pxY(last.c,lo,hi);
    ctx.fillStyle=col;ctx.beginPath();ctx.rect(W-PAD.R+1,ly-9,PAD.R-3,18);ctx.fill();
    ctx.fillStyle='#000';ctx.font='bold 9px monospace';ctx.textAlign='left';
    ctx.fillText((last.c>=0?'+':'')+last.c.toFixed(1),W-PAD.R+4,ly+4);
  });

  // x-axis
  ctx.fillStyle='#555';ctx.font='10px monospace';ctx.textAlign='center';
  const maxL=Math.floor((W-PAD.L-PAD.R)/55);
  const step=Math.max(1,Math.floor(visCount/maxL));
  const ref=lvData.length?lvData:fcDataArr[0];
  ref.slice(startIdx,startIdx+visCount).forEach((d,i)=>{
    if(i%step===0)ctx.fillText(d.label,pxX(i,cw),H-PAD.B+14);
  });
}

// interactions
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;
  if(isDragging){
    const max=Math.max(lvData.length,...fcDataArr.map(f=>f.length));
    const cw=(W-PAD.L-PAD.R)/visCount;
    startIdx=Math.max(0,Math.min(max-visCount,dragStartIdx+Math.round(-(mouseX-dragStartX)/cw)));
  }
  draw();
});
cv.addEventListener('mouseleave',()=>{mouseX=-1;mouseY=-1;tip.style.display='none';draw();});
cv.addEventListener('mousedown',e=>{isDragging=true;dragStartX=e.clientX-cv.getBoundingClientRect().left;dragStartIdx=startIdx;cv.style.cursor='grabbing';});
cv.addEventListener('mouseup',()=>{isDragging=false;cv.style.cursor='crosshair';});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const max=Math.max(lvData.length,...fcDataArr.map(f=>f.length));
  const mx=e.clientX-cv.getBoundingClientRect().left;
  const ratio=(mx-PAD.L)/(W-PAD.L-PAD.R),old=visCount;
  const step=Math.max(5,Math.floor(visCount*0.12));
  visCount=Math.max(10,Math.min(max,visCount+(e.deltaY>0?step:-step)));
  startIdx=Math.max(0,Math.min(max-visCount,Math.round(startIdx+ratio*(old-visCount))));
  draw();
},{passive:false});
let lTX=0,lPD=0;
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true;lTX=e.touches[0].clientX;dragStartIdx=startIdx;}
  if(e.touches.length===2)lPD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchmove',e=>{
  const max=Math.max(lvData.length,...fcDataArr.map(f=>f.length));
  if(e.touches.length===1&&isDragging){
    const cw=(W-PAD.L-PAD.R)/visCount;
    startIdx=Math.max(0,Math.min(max-visCount,dragStartIdx+Math.round(-(e.touches[0].clientX-lTX)/cw)));draw();
  }
  if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    visCount=Math.max(10,Math.min(max,Math.round(visCount*lPD/dist)));
    startIdx=Math.max(0,Math.min(max-visCount,startIdx));lPD=dist;draw();
  }
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchend',()=>{isDragging=false;});
window.addEventListener('keydown',e=>{
  const max=Math.max(lvData.length,...fcDataArr.map(f=>f.length));
  const s=Math.max(1,Math.floor(visCount*0.1));
  if(e.key==='ArrowLeft'){startIdx=Math.max(0,startIdx-s);draw();}
  if(e.key==='ArrowRight'){startIdx=Math.min(max-visCount,startIdx+s);draw();}
  if(e.key==='+'||e.key==='=')zoom(-1);
  if(e.key==='-')zoom(1);
  if(e.key==='f'||e.key==='F')fitAll();
});
window.addEventListener('resize',resize);

// INIT
buildAll();
renderTable();
resize();
setSource('test');
</script>
</body>
